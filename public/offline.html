<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubliStore - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(to bottom right, #3b82f6, #2563eb);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 48px;
      font-weight: bold;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 1rem;
    }

    p {
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(to right, #3b82f6, #2563eb);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">S</div>
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>
      Parece que no tienes conexión a internet. Por favor verifica tu conexión y
      vuelve a intentarlo.
    </p>
    <button class="button" onclick="location.reload()">
      Reintentar
    </button>
  </div>

  <script>
    // Escuchar cambios en la conexión
    window.addEventListener('online', () => {
      location.reload()
    })
  </script>
</body>
</html>
